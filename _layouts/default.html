<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>
    {% if page.title %}
      {{ page.title }} | {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <!-- CSS：baseurl完全対応 -->
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>

<body>

<header>
  <h1>
    <a href="{{ '/' | relative_url }}">
      {{ site.title }}
    </a>
  </h1>

  {% if site.description %}
    <p>{{ site.description }}</p>
  {% endif %}
</header>

<main>
  {{ content }}
</main>

<footer>
  <p>Powered by Jekyll + GitHub Pages</p>
</footer>

</body>
</html>
