<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }} | {{ site.title }}</title>

  <!-- CSS（GitHub Pages対応） -->
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>

<body>

<header>
  <h1>
    <a href="{{ '/' | relative_url }}">
      {{ site.title }}
    </a>
  </h1>

  <p>{{ site.description }}</p>
</header>

<main>
  {{ content }}
</main>

<footer>
  <p>Powered by Jekyll + GitHub Pages</p>
</footer>

</body>
</html>
