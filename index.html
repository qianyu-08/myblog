<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Blog</title>
  <link rel="stylesheet" href="main.css" />
</head>

<body>
  <header class="site-header">
    <h1 class="site-title">My Blog</h1>
    <p class="site-description">連番で増えるだけのブログ</p>
  </header>

  <main class="main">
    <section class="article">
      <header class="article-header">
        <h2 class="article-title">記事一覧</h2>
      </header>

      <div class="article-content">
        <ul id="postList" class="tag-list"></ul>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 My Blog</p>
  </footer>

  <script>
    const list = document.getElementById("postList");

    async function checkPost(id) {
      const path = `posts/${id}/index.html`;

      try {
        const res = await fetch(path, { method: "HEAD" });
        return res.ok;
      } catch {
        return false;
      }
    }

    async function loadPosts() {
      let i = 1;
      const max = 999; // 夢の上限（現実逃避）

      while (i <= max) {
        const id = String(i).padStart(3, "0");

        const exists = await checkPost(id);

        if (!exists) {
          // 連番途切れたら終了（雑な世界）
          i++;
          continue;
        }

        const li = document.createElement("li");
        const a = document.createElement("a");

        a.href = `posts/${id}/index.html`;
        a.textContent = `Post ${id}`;

        li.appendChild(a);
        list.appendChild(li);

        i++;
      }

      if (list.children.length === 0) {
        list.innerHTML = "<li>まだ記事が存在しない</li>";
      }
    }

    loadPosts();
  </script>
</body>
</html>
